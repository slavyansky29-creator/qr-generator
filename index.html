<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QR-кодер и декодер</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Подключение библиотеки для генерации QR-кодов -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- Подключение библиотеки для чтения QR-кодов -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</head>
<body>
    <h1>QR-кодировщик и декодер</h1>
    <div class="container">
        <!-- Левая часть: параметры создания QR -->
        <div class="left-panel">
            <h2>Создать QR-код</h2>
            <label for="dataType">Тип данных:</label>
            <select id="dataType">
                <option value="text">Текст</option>
                <option value="file">Файл / Фото / Видео</option>
                <option value="archive">Архив</option>
                <option value="folder">Папка</option>
                <option value="presentation">Презентация</option>
            </select>

            <div id="inputContainer">
                <label for="textInput">Введите текст или выберите файл:</label>
                <textarea id="textInput" rows="4" placeholder="Введите текст"></textarea>
                <input type="file" id="fileInput" style="display:none;" />
                <button id="chooseFileBtn">Выбрать файл</button>
            </div>

            <!-- Возможность добавить логотип в центр -->
            <div class="logo-section">
                <label for="logoUpload">Добавить логотип (опционально):</label>
                <input type="file" id="logoUpload" accept="image/*" />
            </div>

            <button id="generateBtn">Создать QR-код</button>
            <button id="downloadQRBtn">Скачать QR</button>
            <button id="infoBtn">i</button>
        </div>

        <!-- Правая часть: отображение QR -->
        <div class="center-panel">
            <h2>QR-код</h2>
            <div id="qrcode"></div>
        </div>

        <!-- Внизу: декодер -->
        <div class="bottom-panel">
            <h2>Декодировать QR-код</h2>
            <div class="decoder-options">
                <button id="startCameraBtn">Использовать камеру</button>
                <input type="file" id="uploadImage" accept="image/*" />
            </div>
            <video id="video" width="400" height="300" style="display:none"></video>
            <canvas id="canvas" style="display:none"></canvas>
            <div id="decodedResult"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
