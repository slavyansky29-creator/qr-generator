<!DOCTYPE htl>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QR-код генератор и декодер</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Вставляем библиотеку для генерации QR -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/dist/qrcode.min.js"></script>
    <!-- Вставляем библиотеку для декодирования QR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</head>
<body>
    <h1>QR-код генератор и декодер</h1>
    <div class="container">
        <!-- Левая панель: параметры -->
        <div class="left-panel">
            <h2>Параметры</h2>
            <textarea id="dataInput" placeholder="Введите текст или выберите файл для кодирования..." rows="5"></textarea>
            <button id="selectFileBtn">Выбрать файл</button>
            <input type="file" id="fileInput" style="display:none"/>
            <br/><br/>
            <label>Добавить логотип (опционально):</label>
            <input type="file" id="logoInput" accept="image/*"/>
            <br/><br/>
            <button id="generateBtn">Создать QR-код</button>
            <button id="infoBtn">Информация о QR-коде</button>
            <div id="qrInfo" class="qr-info"></div>
        </div>
        <!-- Правая панель: отображение QR -->
        <div class="right-panel">
            <h2>Генерированный QR-код</h2>
            <canvas id="qrCanvas"></canvas>
        </div>
    </div>
    <!-- Декодер -->
    <h2>Декодировать QR-код</h2>
    <div class="decoder-section">
        <button id="startCameraBtn">Использовать камеру</button>
        <input type="file" id="decodeFileInput" accept="image/*"/>
        <br/><br/>
        <video id="video" width="400" height="300" style="display:none;"></video>
        <canvas id="videoCanvas" width="400" height="300" style="display:none;"></canvas>
        <div id="decodedResult">Результат: </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
